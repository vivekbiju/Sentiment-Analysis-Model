name: AI Pipeline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest transformers torch demoji google-genai pillow python-dotenv shap
        # If you have a requirements.txt, use: pip install -r requirements.txt

    - name: Run Unit Tests
      run: |
        pytest tests/test_model.py